<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 미디어 업로드</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --bg-white: #FFFFFF;
            --bg-sub: #e0e0e0;
            --text-dark: #212529;
            --point-1: #475569;
            --text-on-point: #ecf0f5;
            --point-green: #0f9456;
            --point-red: #ff5454;
            --border-color: #dee2e6;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-sub);
            color: var(--text-dark);
            display: flex; justify-content: center; padding: 50px 20px;
        }

        .write-container {
            width: 100%; max-width: 800px;
            background: var(--bg-white); border-radius: 20px;
            padding: 40px; box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .write-header {
            border-bottom: 2px solid var(--point-1);
            margin-bottom: 30px; padding-bottom: 10px;
        }

        .write-header h2 { margin: 0; font-size: 24px; font-weight: 800; }

        .form-group { margin-bottom: 25px; }

        .form-label {
            display: block; font-size: 15px; font-weight: 700;
            margin-bottom: 10px; color: var(--point-1);
        }

        .input-title {
            width: 100%; padding: 15px; border: 1px solid var(--border-color);
            border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none;
        }

        /* [핵심] 파일 업로드 영역 */
        .upload-wrapper {
            width: 100%; position: relative;
        }

        /* 실제 파일 선택 창은 숨김 */
        #fileInput { display: none; }

        /* 사용자에게 보이는 업로드 박스 */
        .upload-dropzone {
            width: 100%; height: 300px;
            border: 2px dashed var(--point-1); border-radius: 15px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
            background-color: #f8f9fa;
            overflow: hidden; /* 미리보기 이미지 박스 밖으로 안 나가게 함 */
        }

        .upload-dropzone:hover {
            background-color: #f1f3f5; border-color: var(--point-green);
        }

        /* [핵심] 미리보기 이미지 스타일 */
        #previewImage {
            width: 100%; height: 100%;
            object-fit: contain; /* 비율 유지하며 꽉 채움 */
            display: none; /* 파일 선택 전엔 숨김 */
        }

        .upload-placeholder {
            text-align: center; color: var(--point-1);
        }

        .upload-placeholder span { font-size: 40px; }

        .editor-area {
            width: 100%; min-height: 150px; padding: 15px;
            border: 1px solid var(--border-color); border-radius: 10px;
            font-size: 15px; resize: vertical; outline: none; box-sizing: border-box;
            font-family: inherit;
        }

        .write-footer {
            display: flex; justify-content: flex-end; gap: 10px;
            margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 12px 30px; border-radius: 8px; font-weight: 700;
            border: none; cursor: pointer; transition: 0.2s;
        }

        .btn-cancel { background: var(--bg-sub); color: var(--text-dark); }
        .btn-submit { background: var(--point-1); color: var(--text-on-point); }

        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

    <div class="write-container">
        <div class="write-header">
            <h2>사진 / 영상 업로드</h2>
        </div>

        <form id="galleryForm">
            <div class="form-group">
                <label class="form-label">제목</label>
                <input type="text" class="input-title" placeholder="제목을 입력하세요" required>
            </div>

            <div class="form-group">
                <label class="form-label">미디어 첨부 <span style="color: var(--point-red);">*필수</span></label>
                <div class="upload-wrapper" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-dropzone" id="dropzone">
                        <img id="previewImage" src="" alt="미리보기">
                        
                        <div class="upload-placeholder" id="placeholder">
                            <span>📷</span>
                            <p>클릭하여 사진이나 영상을 첨부하세요<br><small>(파일이 없으면 등록할 수 없습니다)</small></p>
                        </div>
                    </div>
                    <input type="file" id="fileInput" accept="image/*, video/*" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">간단한 설명</label>
                <textarea class="editor-area" placeholder="내용을 입력해 주세요."></textarea>
            </div>

            <div class="write-footer">
                <button type="button" class="btn btn-cancel" onclick="history.back()">취소</button>
                <button type="submit" class="btn btn-submit">등록하기</button>
            </div>
        </form>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImage = document.getElementById('previewImage');
        const placeholder = document.getElementById('placeholder');
        const dropzone = document.getElementById('dropzone');

        // 파일 선택 시 미리보기 처리
        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                // 이미지 파일인 경우 미리보기 생성
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        previewImage.src = e.target.result;
                        previewImage.style.display = 'block';
                        placeholder.style.display = 'none';
                        dropzone.style.borderStyle = 'solid'; // 점선을 실선으로 변경
                    }
                    reader.readAsDataURL(file);
                } 
                // 영상 파일인 경우 (간단히 이름만 표시하거나 아이콘 변경)
                else if (file.type.startsWith('video/')) {
                    previewImage.style.display = 'none';
                    placeholder.style.display = 'block';
                    placeholder.innerHTML = "<span>🎬</span><p>" + file.name + "<br>영상이 선택되었습니다.</p>";
                }
            }
        });

        // 폼 제출 시 유효성 검사
        document.getElementById('galleryForm').onsubmit = function(e) {
            if (!fileInput.files.length) {
                e.preventDefault();
                alert('사진이나 영상 파일을 반드시 첨부해야 합니다!');
                return false;
            }
            alert('게시글이 성공적으로 등록되었습니다.');
        };
    </script>

</body>
</html>
