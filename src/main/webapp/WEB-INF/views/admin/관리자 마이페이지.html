<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - Desktop Dashboard</title>
    <style>
        /* --- [1] 핵심 스타일 및 레이아웃 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: #FFFFFF; /* 전체 배경: 순백색 */
            color: #212529;           /* 기본 텍스트 색상 */
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 100%;
            max-width: 1200px;
            gap: 25px;
        }

        /* --- [2] 사이드바 영역 (포인트 1 적용) --- */
        .sidebar {
            color: #ECF0F5;           /* 포인트 1 위 텍스트 색상 */
            background-color: #475569; /* 포인트 1: 스틸 블루 */
            border-radius: 24px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 10px 10px 20px #e0e0e0; 
            height: fit-content;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background-color: #FFFFFF;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
            border: 5px solid #E0E0E0; /* 보조 배경색으로 테두리 */
            font-size: 14px;
            color: #475569;           /* 포인트 1 색상으로 텍스트 강조 */
        }

        .profile-img:hover { transform: rotate(5deg) scale(1.05); }

        .user-info h1 { font-size: 24px; margin-bottom: 10px; text-align: center; color: #ECF0F5; }
        .user-info p { font-size: 14px; color: #cbd5e1; text-align: center; line-height: 1.5; }

        .logo-bottom {
            margin-top: 100px;
            font-weight: 900;
            color: #6d7c91; 
            letter-spacing: 2px;
        }

        /* --- [3] 메인 콘텐츠 영역 --- */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background-color: #E0E0E0; /* 보조 배경: 연그레이 */
            border-radius: 24px;
            padding: 30px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #212529; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .menu-item {
            background-color: #FFFFFF; 
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid #d1d1d1;
        }

        .menu-item:hover {
            border-color: #475569; 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .menu-item strong { font-size: 16px; color: #212529; }
        .menu-item span { font-size: 12px; color: #666; margin-top: 8px; }

        /* 포인트 2 적용 (빨간색 계열) */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            background: #0f9456; 
            color: #FFFFFF;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            width: fit-content;
            margin-top: 10px;
        }

        /* --- [4] 애니메이션 --- */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="profile-img" onclick="changeImage()">ADMIN</div>
            <div class="user-info">
                <h1>관리자</h1>
            </div>
            <div class="logo-bottom">LOG.GG</div>
        </aside>

        <main class="main-content">
            <section class="card">
                <h2>⚙️ <span style="color: #475569;">회원 관리</span></h2>
                <div class="menu-grid">
                    <div class="menu-item" onclick="msg('회원 정보 및 비밀번호 수정')">
                        <strong>회원 관리</strong>
                        <span>사용자 계정 수정 및 계정 정지</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>📝 <span style="color: #475569;">게시물 관리</span></h2>
                <div class="menu-grid">
                    <div class="menu-item" onclick="msg('게시글 조회')">
                        <strong>공지사항 / 패치노트</strong>
                        <span>공지사항 / 패치노트 수정 및 삭제</span> 
                    </div>
                    <div class="menu-item" onclick="msg('삭제 관리')">
                        <strong>회원 게시물 / 댓글 관리</strong>
                        <span>사용자 게시물 / 댓글 수정 및 삭제</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>💬 <span style="color: #475569;">문의 내역</span></h2>
                <div class="menu-grid">
                    <div class="menu-item" style="grid-column: span 1;" onclick="msg('계정 연결')">
                        <strong>문의 내역</strong>
                        <span>문의사항 관리</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function msg(text) {
            alert(text + " 페이지로 이동합니다.");
            // 실제로는 여기서 이전에 만든 '수정 양식 페이지'로 이동하게 됩니다.
        }

        function changeImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                alert('이미지 파일이 선택되었습니다: ' + e.target.files[0].name);
            };
            input.click();
        }
    </script>
</body>
</html>
