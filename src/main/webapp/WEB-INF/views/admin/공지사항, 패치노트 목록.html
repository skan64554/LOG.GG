<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 콘텐츠 관리</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --admin-navy: #334155;
            --bg-light: #f1f5f9;
            --card-bg: #ffffff;
            --accent-blue: #3b82f6;
            --border-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 40px;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 상단 헤더 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .header h2 {
            font-size: 24px;
            font-weight: 800;
            color: var(--admin-navy);
            margin: 0;
        }

        .btn-write {
            background: var(--admin-navy);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        /* 탭 메뉴 (메인 페이지 실시간 인기글 스타일 원용) */
        .tab-menu {
            display: flex;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
            margin-bottom: 25px;
        }

        .tab-item {
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: #64748b;
            transition: all 0.2s;
        }

        .tab-item.active {
            background: white;
            color: var(--accent-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 리스트 카드 */
        .content-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 30px;
        }

        /* 테이블 (자유 게시판 스타일 계승) */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        .admin-table thead {
            border-bottom: 3px solid #000;
        }

        .admin-table th {
            padding: 15px;
            font-size: 14px;
            color: #475569;
            background: #f8fafc;
        }

        .admin-table td {
            padding: 18px 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .title-link {
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            color: #1e293b;
            text-decoration: none;
        }

        .title-link:hover {
            text-decoration: underline;
        }

        /* 액션 버튼 */
        .btn-action {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            font-size: 12px;
            margin: 0 2px;
        }

        .btn-delete {
            color: #ef4444;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
        }

        .pagination .active { color: #000; font-weight: 800; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>공지사항 / 패치노트 관리</h2>
            <button class="btn-write">새 글 작성하기</button>
        </div>

        <div class="tab-menu">
            <div class="tab-item active" onclick="switchTab(this, 'notice')">공지사항</div>
            <div class="tab-item" onclick="switchTab(this, 'patch')">패치노트</div>
        </div>

        <div class="content-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th width="80">번호</th>
                        <th>제목</th>
                        <th width="120">작성일</th>
                        <th width="100">조회수</th>
                        <th width="150">관리</th>
                    </tr>
                </thead>
                <tbody id="list-body">
                    <tr>
                        <td>002</td>
                        <td class="title-link">[공지] 서버 정기 점검 안내 (03/12)</td>
                        <td>25-03-10</td>
                        <td>1,245</td>
                        <td>
                            <button class="btn-action">수정</button>
                            <button class="btn-action btn-delete">삭제</button>
                        </td>
                    </tr>
                    <tr>
                        <td>001</td>
                        <td class="title-link">[공지] 커뮤니티 이용 규칙 개정 안내</td>
                        <td>25-02-28</td>
                        <td>3,502</td>
                        <td>
                            <button class="btn-action">수정</button>
                            <button class="btn-action btn-delete">삭제</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination">
                <span>&lt; 이전</span>
                <span class="active">1</span>
                <span>2</span>
                <span>3</span>
                <span>다음 &gt;</span>
            </div>
        </div>
    </div>

    <script>
        function switchTab(element, type) {
            // 탭 활성화 변경
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            // 실제 구현 시에는 여기서 API를 호출해 데이터를 바꿔줍니다.
            const body = document.getElementById('list-body');
            if(type === 'patch') {
                body.innerHTML = `
                    <tr>
                        <td>002</td>
                        <td class="title-link">[패치] v1.4.2 밸런스 조정 및 버그 수정</td>
                        <td>25-03-05</td>
                        <td>8,921</td>
                        <td><button class="btn-action">수정</button> <button class="btn-action btn-delete">삭제</button></td>
                    </tr>
                    <tr>
                        <td>001</td>
                        <td class="title-link">[패치] 배틀그라운드 신규 맵 업데이트 소식</td>
                        <td>25-02-15</td>
                        <td>12,400</td>
                        <td><button class="btn-action">수정</button> <button class="btn-action btn-delete">삭제</button></td>
                    </tr>
                `;
            } else {
                location.reload(); // 공지사항으로 복구 (예시)
            }
        }
    </script>
</body>
</html>
