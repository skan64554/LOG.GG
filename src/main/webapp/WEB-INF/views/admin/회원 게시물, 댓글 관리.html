<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 회원 콘텐츠 관리</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --admin-navy: #334155;
            --bg-light: #f1f5f9;
            --card-bg: #ffffff;
            --accent-blue: #3b82f6;
            --accent-red: #ef4444;
            --border-color: #e2e8f0;
        }

        body {
            margin: 0;
            padding: 40px;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* 상단 헤더 영역 */
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center; /* 탭과 높이 맞춤 */
            margin-bottom: 30px;
        }

        .header-section h2 {
            font-size: 24px;
            font-weight: 800;
            color: var(--admin-navy);
            margin: 0;
        }

        /* 탭 메뉴 (공지사항/패치노트 스타일 원용) */
        .tab-menu {
            display: flex;
            background: #e2e8f0;
            padding: 5px;
            border-radius: 12px;
            width: fit-content;
            margin-bottom: 25px; /* 헤더 아래로 배치 */
        }

        .tab-item {
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            color: #64748b;
            transition: all 0.2s;
        }

        .tab-item.active {
            background: white;
            color: var(--accent-blue);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        /* 필터 영역 */
        .filter-group {
            display: flex;
            gap: 10px;
        }

        .select-box {
            padding: 10px 15px;
            border-radius: 10px;
            border: 1px solid var(--border-color);
            background-color: white;
            font-weight: 600;
            color: var(--admin-navy);
            cursor: pointer;
            font-size: 13px;
        }

        /* 메인 관리 카드 */
        .content-card {
            background: var(--card-bg);
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            padding: 30px;
        }

        /* 리스트 테이블 */
        .admin-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        .admin-table thead {
            border-bottom: 3px solid #000;
        }

        .admin-table th {
            padding: 15px;
            font-size: 14px;
            background: #f8fafc;
            color: #475569;
        }

        .admin-table td {
            padding: 18px 15px;
            border-bottom: 1px solid var(--border-color);
            font-size: 14px;
        }

        .text-left { text-align: left; }
        
        .author-tag {
            font-weight: 700;
            color: #475569;
        }

        /* 관리 액션 버튼 */
        .btn-delete {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--accent-red);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-delete:hover {
            background: var(--accent-red);
            color: white;
            border-color: var(--accent-red);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
        }

        .pagination .active { color: #000; font-weight: 800; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <h2>회원 게시물 / 댓글 관리</h2>
            <div class="filter-group">
                <select class="select-box">
                    <option>🎮 전체 게임</option>
                    <option>배틀그라운드</option>
                    <option>오버워치</option>
                    <option>리그 오브 레전드</option>
                </select>
                <select class="select-box">
                    <option>최신순</option>
                    <option>신고많은순</option>
                </select>
            </div>
        </div>

        <div class="tab-menu">
            <div class="tab-item active" onclick="switchTab(this, 'post')">게시물 관리</div>
            <div class="tab-item" onclick="switchTab(this, 'comment')">댓글 관리</div>
        </div>

        <div class="content-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th width="80">번호</th>
                        <th width="120">게임</th>
                        <th>제목/내용</th>
                        <th width="120">작성자</th>
                        <th width="120">날짜</th>
                        <th width="100">관리</th>
                    </tr>
                </thead>
                <tbody id="admin-list-body">
                    <tr>
                        <td>124</td>
                        <td><span style="color:#3b82f6; font-weight:700;">배틀그라운드</span></td>
                        <td class="text-left">에란겔 짤파밍 꿀팁 공유합니다.</td>
                        <td><span class="author-tag">USER01</span></td>
                        <td>03.09</td>
                        <td><button class="btn-delete" onclick="deleteItem(this)">삭제</button></td>
                    </tr>
                    <tr>
                        <td>123</td>
                        <td><span style="color:#ef4444; font-weight:700;">오버워치</span></td>
                        <td class="text-left">이번 패치 딜러 버프 체감 되나요?</td>
                        <td><span class="author-tag">Kim_Log</span></td>
                        <td>03.08</td>
                        <td><button class="btn-delete" onclick="deleteItem(this)">삭제</button></td>
                    </tr>
                </tbody>
            </table>

            <div class="pagination">
                <span>&lt; 이전</span>
                <span class="active">1</span>
                <span>2</span>
                <span>3</span>
                <span>4</span>
                <span>5</span>
                <span>다음 &gt;</span>
            </div>
        </div>
    </div>

    <script>
        // 탭 전환 기능
        function switchTab(element, type) {
            document.querySelectorAll('.tab-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            const body = document.getElementById('admin-list-body');
            
            if(type === 'comment') {
                body.innerHTML = `
                    <tr>
                        <td>45</td>
                        <td><span style="color:#3b82f6; font-weight:700;">배틀그라운드</span></td>
                        <td class="text-left">오 정보 감사합니다! 오늘 가볼게요.</td>
                        <td><span class="author-tag">Gamer_A</span></td>
                        <td>03.10</td>
                        <td><button class="btn-delete" onclick="deleteItem(this)">삭제</button></td>
                    </tr>
                    <tr>
                        <td>44</td>
                        <td><span style="color:#ef4444; font-weight:700;">오버워치</span></td>
                        <td class="text-left">동의합니다 딜러 너무 세졌어요 ㅠㅠ</td>
                        <td><span class="author-tag">Healer_Main</span></td>
                        <td>03.10</td>
                        <td><button class="btn-delete" onclick="deleteItem(this)">삭제</button></td>
                    </tr>
                `;
            } else {
                // 게시물 관리 탭 클릭 시 (예시 데이터)
                body.innerHTML = `
                    <tr>
                        <td>124</td>
                        <td><span style="color:#3b82f6; font-weight:700;">배틀그라운드</span></td>
                        <td class="text-left">에란겔 짤파밍 꿀팁 공유합니다.</td>
                        <td><span class="author-tag">USER01</span></td>
                        <td>03.09</td>
                        <td><button class="btn-delete" onclick="deleteItem(this)">삭제</button></td>
                    </tr>
                    <tr>
                        <td>123</td>
                        <td><span style="color:#ef4444; font-weight:700;">오버워치</span></td>
                        <td class="text-left">이번 패치 딜러 버프 체감 되나요?</td>
                        <td><span class="author-tag">Kim_Log</span></td>
                        <td>03.08</td>
                        <td><button class="btn-delete" onclick="deleteItem(this)">삭제</button></td>
                    </tr>
                `;
            }
        }

        // 삭제 확인 기능
        function deleteItem(btn) {
            const row = btn.closest('tr');
            const content = row.querySelector('.text-left').innerText;
            if(confirm(`"${content}"\n해당 항목을 정말로 삭제하시겠습니까?`)) {
                row.style.opacity = '0.3';
                row.style.pointerEvents = 'none';
                alert('삭제 처리가 완료되었습니다.');
            }
        }
    </script>
</body>
</html>
