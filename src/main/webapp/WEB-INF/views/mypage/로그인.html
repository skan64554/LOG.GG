<!DOCTYPE html>
<html>
<head>
    <style>
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 350px; text-align: center; }
        h1 { color: #1a2a3a; margin-bottom: 30px; font-size: 35px; letter-spacing: -1px;}
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; color: #888; margin-bottom: 5px; display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; background-color: #fafafa; }
        .login-btn { width: 100%; padding: 12px; background-color: #2c3e50; border: none; border-radius: 8px; color: white; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .links { margin-top: 15px; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>LOG.GG</h1>
        <div class="input-group">
            <label>아이디</label>
            <input type="text" placeholder="아이디를 입력하세요">
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" placeholder="비밀번호를 입력하세요">
        </div>
        <button class="login-btn">로그인</button>
        <div class="links">비밀번호 찾기 | 회원가입</div>
    </div>
</body>
</html>
