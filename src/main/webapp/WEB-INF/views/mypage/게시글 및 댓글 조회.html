<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 나의 활동 내역</title>
    <style>
        /* --- [1] 기본 스타일 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }

        body {
            background-color: #FFFFFF;
            color: #212529;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        .activity-container {
            width: 100%;
            max-width: 900px;
            background-color: #FFFFFF;
        }

        /* 헤더 영역 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 30px;
            border-bottom: 2px solid #475569;
            padding-bottom: 15px;
        }

        .header h1 {
            font-size: 24px;
            color: #475569;
        }

        .header .stats {
            font-size: 14px;
            color: #666;
        }

        .stats b {
            color: #ff5454;
        }

        /* --- [2] 탭 메뉴 (게시글 / 댓글 구분) --- */
        .tab-menu {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .tab-item {
            padding: 10px 20px;
            border-radius: 8px;
            background-color: #E0E0E0;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }

        .tab-item.active {
            background-color: #475569;
            color: #FFFFFF;
        }

        /* --- [새로 추가] 게임 카테고리 필터 --- */
        .game-filter {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            padding: 10px;
            background-color: #f8f9fa;
            border-radius: 10px;
        }

        .filter-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #dee2e6;
            background-color: white;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            transition: 0.2s;
        }

        .filter-btn:hover {
            border-color: #475569;
            color: #475569;
        }

        .filter-btn.active {
            background-color: #3b82f6; /* 강조용 블루 */
            border-color: #3b82f6;
            color: white;
        }

        /* 게임 태그 배지 */
        .game-tag {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 8px;
            font-weight: bold;
        }
        .tag-lol { background: #fee2e2; color: #ef4444; }
        .tag-pubg { background: #fef3c7; color: #d97706; }
        .tag-ow { background: #e0e7ff; color: #4f46e5; }

        /* --- [3] 리스트 테이블 스타일 --- */
        .activity-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .activity-table th {
            background-color: #f8f9fa;
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #E0E0E0;
            color: #475569;
        }

        .activity-table td {
            padding: 15px 12px;
            border-bottom: 1px solid #f1f1f1;
        }

        .activity-table tr:hover {
            background-color: #fcfcfc;
        }

        .post-title {
            color: #212529;
            text-decoration: none;
            font-weight: 500;
        }

        .post-title:hover {
            text-decoration: underline;
        }

        .comment-count {
            color: #ff5454;
            font-size: 12px;
            font-weight: bold;
            margin-left: 5px;
        }

        .meta-info {
            color: #999;
            font-size: 13px;
        }

        /* --- [4] 하단 버튼 --- */
        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 20px;
            background-color: #E0E0E0;
            color: #475569;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-back:hover {
            background-color: #d1d1d1;
        }
    </style>
</head>
<body>

    <div class="activity-container">
        <div class="header">
            <h1>📝 나의 활동 내역</h1>
            <div class="stats">작성한 게시글 총 <b>12</b>개 | 댓글 <b>48</b>개</div>
        </div>

        <div class="tab-menu">
            <div class="tab-item active">작성한 게시글</div>
            <div class="tab-item">작성한 댓글</div>
        </div>

        <div class="game-filter">
            <button class="filter-btn active">전체</button>
            <button class="filter-btn">리그 오브 레전드</button>
            <button class="filter-btn">배틀그라운드</button>
            <button class="filter-btn">오버워치</button>
        </div>

        <table class="activity-table">
            <thead>
                <tr>
                    <th style="width: 60%;">제목</th>
                    <th style="width: 20%;">날짜</th>
                    <th style="width: 10%;">조회</th>
                    <th style="width: 10%;">공감</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>
                        <span class="game-tag tag-lol">LoL</span>
                        <a href="#" class="post-title">오늘 자 랭크 게임 메타 정리.txt</a>
                        <span class="comment-count">[5]</span>
                    </td>
                    <td class="meta-info">2026.03.06</td>
                    <td class="meta-info">1,240</td>
                    <td class="meta-info" style="color: #475569;">+12</td>
                </tr>
                <tr>
                    <td>
                        <span class="game-tag tag-ow">OW2</span>
                        <a href="#" class="post-title">신규 캐릭터 스킨 유출 정보 공유합니다.</a>
                        <span class="comment-count">[12]</span>
                    </td>
                    <td class="meta-info">2026.03.04</td>
                    <td class="meta-info">850</td>
                    <td class="meta-info" style="color: #475569;">+24</td>
                </tr>
                <tr>
                    <td>
                        <span class="game-tag tag-pubg">PUBG</span>
                        <a href="#" class="post-title">에란겔 짤파밍 효율 동선 공유</a>
                        <span class="comment-count">[8]</span>
                    </td>
                    <td class="meta-info">2026.03.02</td>
                    <td class="meta-info">2,100</td>
                    <td class="meta-info" style="color: #475569;">+45</td>
                </tr>
            </tbody>
        </table>

        <a href="#" class="btn-back" onclick="history.back(); return false;"> 이전 페이지</a>
    </div>

</body>
</html>
