<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 게시글 보기</title>
    <style>
        /* 기본 설정 */
        :root {
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --navy-main: #34495e; /* LOG.GG 메인 네이비 */
            --navy-dark: #2c3e50;
            --text-dark: #333333;
            --gray-light: #e0e0e0;
            --accent-red: #e74c3c;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 1024px;
            width: 1440px; /* 고정 너비 요청 반영 */
            margin: 0 auto;
        }

        .container {
            width: 1000px;
            margin-top: 50px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            padding: 40px;
            box-sizing: border-box;
        }

        /* 게시글 상단 */
        .post-header {
            border-bottom: 2px solid var(--gray-light);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .post-title {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-dark);
            margin: 0;
        }

        /* 게시글 본문 */
        .post-content {
            min-height: 400px;
            font-size: 18px;
            line-height: 1.6;
            color: #444;
            padding: 20px 0;
        }

        /* 수정/삭제 버튼 영역 */
        .action-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 40px;
        }

        .btn {
            padding: 10px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }

        .btn-edit {
            background-color: var(--navy-main);
            color: white;
        }

        .btn-edit:hover {
            background-color: var(--navy-dark);
        }

        .btn-delete {
            background-color: #bdc3c7;
            color: #333;
        }

        .btn-delete:hover {
            background-color: #95a5a6;
        }

        /* 통계 및 신고 */
        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .recommend-count {
            font-size: 18px;
        }

        .report-link {
            color: var(--accent-red);
            cursor: pointer;
            text-decoration: none;
        }

        /* 댓글 영역 */
        .comment-section {
            background: var(--gray-light);
            border-radius: 12px;
            overflow: hidden;
        }

        .comment-item {
            display: flex;
            padding: 15px 20px;
            border-bottom: 1px solid #d0d0d0;
            align-items: center;
            font-size: 15px;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-item.reply {
            padding-left: 50px;
            background-color: #dcdcdc;
        }

        .author {
            font-weight: bold;
            width: 100px;
            flex-shrink: 0;
        }

        .content {
            flex-grow: 1;
        }

        .actions {
            display: flex;
            gap: 10px;
            color: #666;
            font-size: 14px;
        }

        .actions span {
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="post-header">
            <h1 class="post-title">오늘 자 랭크 게임 메타 정리.txt</h1>
        </div>

        <div class="post-content">
            글 내용이 여기에 들어갑니다. <br>
            LOG.GG 커뮤니티 가이드라인을 준수해주세요.
        </div>

        <div class="action-buttons">
            <button class="btn btn-edit" onclick="handleEdit()">수정</button>
            <button class="btn btn-delete" onclick="handleDelete()">삭제</button>
        </div>

        <div class="post-footer">
            <div class="recommend-count">추천수 : <span id="rec-count">12</span></div>
            <div class="report-link">신고</div>
        </div>

        <div class="comment-section">
            <div class="comment-item">
                <div class="author">글쓴이 |</div>
                <div class="content">좋은 정보 감사합니다!</div>
                <div class="actions">
                    <span>|답글</span> <span>|댓글신고</span> <span>|공감</span>
                </div>
            </div>
            <div class="comment-item reply">
                <div class="author">ㄴ 글쓴이 |</div>
                <div class="content">도움이 되셨다니 다행이네요.</div>
                <div class="actions">
                    <span>|답글</span> <span>|댓글신고</span> <span>|공감</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleEdit() {
            if(confirm("게시글을 수정하시겠습니까?")) {
                alert("수정 페이지로 이동합니다.");
            }
        }

        function handleDelete() {
            if(confirm("정말로 삭제하시겠습니까? 복구할 수 없습니다.")) {
                alert("게시글이 삭제되었습니다.");
            }
        }
    </script>
</body>
</html>
