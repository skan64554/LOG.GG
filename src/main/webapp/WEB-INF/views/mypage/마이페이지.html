<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - Desktop Dashboard</title>
    <style>
        /* --- [1] 핵심 스타일 및 레이아웃 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', sans-serif;
        }
        a{
            text-decoration: none;
            color: inherit;
        }

        body {
            background-color: #FFFFFF;
            color: #212529;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
        }

        .dashboard-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            width: 100%;
            max-width: 1200px;
            gap: 25px;
        }

        /* --- [2] 사이드바 영역 --- */
        .sidebar {
            color: #ECF0F5;
            background-color: #475569;
            border-radius: 24px;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 10px 10px 20px #e0e0e0; 
            height: fit-content;
            min-height: 400px;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background-color: #FFFFFF;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 25px;
            transition: 0.3s;
            border: 5px solid #E0E0E0;
            font-size: 14px;
            color: #475569;
        }

        .profile-img:hover { transform: rotate(5deg) scale(1.05); }

        .user-info h1 { font-size: 24px; margin-bottom: 10px; text-align: center; color: #ECF0F5; }
        .user-info p { font-size: 14px; color: #cbd5e1; text-align: center; line-height: 1.5; }

        .logout-btn {
            margin-top: 40px;
            width: 100%;
            padding: 12px;
            background-color: #D1D5DB;
            color: #475569;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .logout-btn:hover { background-color: #9CA3AF; }

        .logo-bottom {
            margin-top: 25px;
            font-weight: 900;
            color: #6d7c91; 
            letter-spacing: 2px;
        }

        /* --- [3] 메인 콘텐츠 영역 --- */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .card {
            background-color: #E0E0E0;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.05);
            animation: fadeIn 0.5s ease forwards;
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #212529; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .menu-item {
            background-color: #FFFFFF; 
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            border: 1px solid #d1d1d1;
        }

        .menu-item:hover {
            border-color: #475569; 
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .menu-item strong { font-size: 16px; color: #212529; }
        .menu-item span { font-size: 12px; color: #666; margin-top: 8px; }

        /* 회원 탈퇴 아이템 전용 스타일 (글자색 강조) */
        .withdraw-item:hover {
            border-color: #ff5454;
        }
        .withdraw-item strong { color: #ff5454; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="profile-img" onclick="changeImage()">프로필 변경</div>
            <div class="user-info">
                <h1>닉네임</h1>
                <p>일반 회원<br>email@naver.com</p>
            </div>
            
            <button class="logout-btn" onclick="msg('로그아웃')">로그아웃</button>
            
            <div class="logo-bottom">LOG.GG</div>
        </aside>

        <main class="main-content">
            <section class="card">
                <h2>⚙️ <span style="color: #475569;">계정 설정</span></h2>
                <div class="menu-grid">
                    <div class="menu-item" onclick="msg('회원 정보 및 비밀번호 수정')">
                        <strong>회원 정보 수정</strong>
                        <span>이메일, 연락처 및 비밀번호를 변경합니다.</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>📝 <span style="color: #475569;">커뮤니티 활동</span></h2>
                <div class="menu-grid">
                    <div class="menu-item" onclick="msg('게시글 조회')">
                        <strong>작성한 게시글 / 댓글 조회</strong>
                        <span style="color: #ff5454; font-weight: bold;">내가 쓴 글 총 12개</span> 
                    </div>
                    <div class="menu-item" onclick="msg('삭제 관리')">
                        <strong>수정 및 삭제 관리</strong>
                        <span>일괄 삭제 기능을 제공합니다.</span>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>⚠️ <span style="color: #475569;">기타 설정</span></h2>
                <a href="../마이페이지/회원탈퇴1.html">
                <div class="menu-grid">
                    <div class="menu-item withdraw-item" onclick="confirmWithdrawal()">
                        <strong>회원 탈퇴</strong>
                        <span>계정을 삭제하며 모든 데이터를 파기합니다.</span>
                    </div>
                </div>
                </a>
            </section>
        </main>
    </div>

    <script>

        function changeImage() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = e => {
                alert('이미지 파일이 선택되었습니다: ' + e.target.files[0].name);
            };
            input.click();
        }
    </script>
</body>
</html>
