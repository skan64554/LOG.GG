<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 아이디/비밀번호 찾기</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary-navy: #475569;
            --bg-white: #FFFFFF;
            --bg-sub: #e0e0e0;
            --text-dark: #212529;
            --text-sub: #64748b;
            --border-color: #dee2e6;
            --input-bg: #f8f9fa;
        }

        body {
            margin: 0;
            background-color: var(--bg-sub);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Pretendard', sans-serif;
        }

        .find-card {
            background: var(--bg-white);
            width: 450px;
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 900;
            color: var(--primary-navy);
            margin-bottom: 40px;
        }

        /* 이미지와 동일한 탭 스타일 */
        .tab-group {
            display: flex;
            margin-bottom: 35px;
            border-bottom: 2px solid #f1f3f5;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 15px;
            font-size: 16px;
            font-weight: 800;
            color: #adb5bd;
            cursor: pointer;
            transition: 0.2s;
        }

        .tab.active {
            color: var(--primary-navy);
            border-bottom: 2px solid var(--primary-navy);
        }

        .info-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-sub);
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 800;
            color: var(--primary-navy);
            margin-bottom: 8px;
            padding-left: 4px;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            font-size: 15px;
            box-sizing: border-box;
            background-color: var(--input-bg);
            outline: none;
        }

        .form-group input::placeholder {
            color: #cbd5e1;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            background: var(--primary-navy);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
        }

        /* 섹션 숨김 처리 */
        .find-section { display: none; }
        .find-section.active { display: block; }

        .footer-link {
            text-align: center;
            margin-top: 25px;
        }

        .footer-link a {
            color: var(--text-sub);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="find-card">
        <div class="logo">LOG.GG</div>

        <div class="tab-group">
            <div id="tab-id" class="tab active" onclick="switchTab('id')">아이디 찾기</div>
            <div id="tab-pw" class="tab" onclick="switchTab('pw')">비밀번호 찾기</div>
        </div>

        <div id="section-id" class="find-section active">
            <p class="info-text">가입 시 등록한 이름과 이메일을 입력하세요.</p>
            <div class="form-group">
                <label>이름</label>
                <input type="text" placeholder="성함을 입력하세요">
            </div>
            <div class="form-group">
                <label>이메일</label>
                <input type="email" placeholder="example@log.gg">
            </div>
            <button class="btn-main">아이디 찾기</button>
        </div>

        <div id="section-pw" class="find-section">
            <p class="info-text">비밀번호 재설정을 위해 정보를 입력하세요.</p>
            <div class="form-group">
                <label>아이디</label>
                <input type="text" placeholder="아이디를 입력하세요">
            </div>
            <div class="form-group">
                <label>이름</label>
                <input type="text" placeholder="성함을 입력하세요">
            </div>
            <div class="form-group">
                <label>가입 이메일</label>
                <input type="email" placeholder="example@log.gg">
            </div>
            <button class="btn-main">비밀번호 찾기</button>
        </div>

        <div class="footer-link">
            <a href="login.html">로그인 화면으로 돌아가기</a>
        </div>
    </div>

    <script>
        function switchTab(type) {
            // 1. 모든 탭과 섹션의 활성화 클래스 제거
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.find-section').forEach(s => s.classList.remove('active'));

            // 2. 선택한 탭에 따른 화면 전환
            if (type === 'id') {
                document.getElementById('tab-id').classList.add('active');
                document.getElementById('section-id').classList.add('active');
            } else {
                document.getElementById('tab-pw').classList.add('active');
                document.getElementById('section-pw').classList.add('active');
            }
        }
    </script>

</body>
</html>
