<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 댓글 수정 및 삭제 관리</title>
    <style>
        :root {
            --bg-color: #f4f7f9;
            --navy-main: #34495e;
            --navy-dark: #2c3e50;
            --gray-text: #7f8c8d;
            --border-color: #dcdde1;
            --accent-red: #e74c3c;
            --white: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            width: 1440px;
            margin: 0 auto;
            color: #333;
        }

        .manage-container {
            width: 1100px;
            margin: 50px auto;
            background: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 40px;
        }

        /* 헤더 영역 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-bottom: 2px solid var(--navy-main);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .header h2 {
            margin: 0;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            font-size: 14px;
            color: var(--gray-text);
        }

        .stats b { color: var(--accent-red); }

        /* 컨트롤 바 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-delete-selected {
            background-color: var(--white);
            border: 1px solid var(--accent-red);
            color: var(--accent-red);
        }

        .btn-delete-selected:hover {
            background-color: var(--accent-red);
            color: var(--white);
        }

        /* 테이블 스타일 */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #f9f9f9;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            text-align: left;
            font-size: 14px;
            color: var(--navy-dark);
        }

        td {
            padding: 15px 12px;
            border-bottom: 1px solid #eee;
            font-size: 15px;
        }

        .col-check { width: 40px; text-align: center; }
        .col-content { width: 550px; }
        .col-date { width: 150px; color: var(--gray-text); }
        .col-action { width: 150px; text-align: center; }

        .original-post {
            display: block;
            font-size: 12px;
            color: var(--navy-main);
            margin-top: 5px;
            text-decoration: none;
        }

        /* 수정 입력창 스타일 */
        .edit-input {
            width: 90%;
            padding: 8px;
            border: 1px solid var(--navy-main);
            border-radius: 4px;
            display: none;
        }

        .action-link {
            font-size: 13px;
            margin: 0 5px;
            cursor: pointer;
            color: var(--navy-main);
            text-decoration: underline;
        }

        .action-link.delete { color: var(--accent-red); }

        .btn-prev {
            margin-top: 30px;
            background-color: #e0e0e0;
            color: #555;
        }
    </style>
</head>
<body>

<div class="manage-container">
    <div class="header">
        <h2>📝 나의 댓글 관리</h2>
        <div class="stats">작성한 댓글 총 <b>48개</b></div>
    </div>

    <div class="control-bar">
        <button class="btn btn-delete-selected" onclick="deleteSelected()">선택 삭제</button>
    </div>

    <table>
        <thead>
            <tr>
                <th class="col-check"><input type="checkbox" id="checkAll"></th>
                <th class="col-content">내용</th>
                <th class="col-date">날짜</th>
                <th class="col-action">관리</th>
            </tr>
        </thead>
        <tbody id="commentTableBody">
            <tr id="row-1">
                <td class="col-check"><input type="checkbox" class="chk"></td>
                <td class="col-content">
                    <span class="text-view">좋은 정보 감사합니다! 덕분에 티어 올렸어요.</span>
                    <input type="text" class="edit-input" value="좋은 정보 감사합니다! 덕분에 티어 올렸어요.">
                    <a href="#" class="original-post">원문: 오늘 자 랭크 게임 메타 정리.txt [5]</a>
                </td>
                <td class="col-date">2026.03.08</td>
                <td class="col-action">
                    <span class="action-link" onclick="toggleEdit(1)">수정</span>
                    <span class="action-link delete" onclick="deleteRow(1)">삭제</span>
                </td>
            </tr>
            <tr id="row-2">
                <td class="col-check"><input type="checkbox" class="chk"></td>
                <td class="col-content">
                    <span class="text-view">이 스킨 언제 출시되나요? 진짜 역대급인데.</span>
                    <input type="text" class="edit-input" value="이 스킨 언제 출시되나요? 진짜 역대급인데.">
                    <a href="#" class="original-post">원문: 신규 캐릭터 스킨 유출 정보 공유합니다. [12]</a>
                </td>
                <td class="col-date">2026.03.04</td>
                <td class="col-action">
                    <span class="action-link" onclick="toggleEdit(2)">수정</span>
                    <span class="action-link delete" onclick="deleteRow(2)">삭제</span>
                </td>
            </tr>
        </tbody>
    </table>

    <button class="btn btn-prev" onclick="history.back()">이전 페이지</button>
</div>

<script>
    // 전체 선택 기능
    document.getElementById('checkAll').addEventListener('change', function() {
        const checkboxes = document.querySelectorAll('.chk');
        checkboxes.forEach(chk => chk.checked = this.checked);
    });

    // 수정 모드 토글
    function toggleEdit(id) {
        const row = document.getElementById(`row-${id}`);
        const textView = row.querySelector('.text-view');
        const editInput = row.querySelector('.edit-input');
        const actionBtn = row.querySelector('.action-link');

        if (editInput.style.display === 'none' || editInput.style.display === '') {
            editInput.style.display = 'block';
            textView.style.display = 'none';
            actionBtn.innerText = '저장';
            actionBtn.style.color = 'blue';
        } else {
            // 저장 로직
            textView.innerText = editInput.value;
            editInput.style.display = 'none';
            textView.style.display = 'block';
            actionBtn.innerText = '수정';
            actionBtn.style.color = '';
            alert('댓글이 수정되었습니다.');
        }
    }

    // 개별 삭제
    function deleteRow(id) {
        if(confirm('이 댓글을 정말 삭제하시겠습니까?')) {
            document.getElementById(`row-${id}`).remove();
        }
    }

    // 선택 삭제
    function deleteSelected() {
        const selected = document.querySelectorAll('.chk:checked');
        if (selected.length === 0) {
            alert('삭제할 댓글을 선택해주세요.');
            return;
        }
        if (confirm(`${selected.length}개의 댓글을 일괄 삭제하시겠습니까?`)) {
            selected.forEach(chk => chk.closest('tr').remove());
        }
    }
</script>

</body>
</html>
