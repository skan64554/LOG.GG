<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG.GG - 회원 탈퇴</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            /* 기존 LOG.GG 프로젝트 색상 팔레트 계승 */
            --primary-navy: #475569;
            --bg-white: #FFFFFF;
            --bg-sub: #e0e0e0; /* 마이페이지 배경색 */
            --text-dark: #212529;
            --text-sub: #64748b;
            --point-red: #ff5454; /* 갤러리 HOT 배지 및 탈퇴 포인트 컬러 */
            --border-color: #dee2e6;
            --transition: all 0.2s ease-in-out;
        }
        a{
            text-decoration: none;
            color: inherit;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-sub); /* 업로드해주신 배경의 연회색 톤 */
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .withdrawal-container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        /* LOG.GG 특유의 큰 둥근 카드 스타일 */
        .withdrawal-card {
            background: var(--bg-white);
            border-radius: 30px; /* 마이페이지 카드의 큰 곡률 적용 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            padding: 50px 40px;
            text-align: center;
        }

        .icon-warning {
            font-size: 54px;
            margin-bottom: 15px;
            display: inline-block;
        }

        h2 {
            font-size: 26px;
            font-weight: 900; /* LOG.GG 로고 느낌의 굵은 폰트 */
            color: var(--primary-navy);
            margin-bottom: 12px;
        }

        .sub-text {
            color: var(--text-sub);
            font-size: 15px;
            margin-bottom: 35px;
        }

        /* 주의사항 영역 (제공해주신 관리자 페이지 내부 흰색 박스 스타일 원용) */
        .warning-box {
            background: #f1f3f5; /* 갤러리 상자 내부 배경색과 통일 */
            border-radius: 20px;
            padding: 25px;
            text-align: left;
            margin-bottom: 35px;
            border: 1px solid var(--border-color);
        }

        .warning-box h3 {
            font-size: 15px;
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--primary-navy);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .warning-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.8;
        }

        .warning-list li {
            position: relative;
            padding-left: 18px;
        }

        .warning-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: var(--point-red);
            font-weight: bold;
        }

        /* 체크박스 영역 */
        .confirm-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 35px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            color: var(--primary-navy);
        }

        .confirm-area input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--point-red); /* 체크박스 색상 통일 */
        }

        /* 버튼 그룹 (등록 페이지의 하단 버튼 스타일 계승) */
        .btn-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: var(--transition);
        }

        .btn-cancel {
            background: var(--bg-sub);
            color: var(--primary-navy);
        }

        .btn-cancel:hover {
            filter: brightness(0.9);
        }

        .btn-submit {
            background: var(--primary-navy); /* 기본은 네이비 */
            color: white;
            opacity: 0.3;
            pointer-events: none;
        }

        /* 활성화 시 빨간색으로 변경하여 경고 의미 강조 */
        .btn-submit.active {
            background: var(--point-red);
            opacity: 1;
            pointer-events: auto;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="withdrawal-container">
        <div class="withdrawal-card">
            <span class="icon-warning">⚠️</span>
            <h2>정말로 탈퇴하시겠어요?</h2>
            <p class="sub-text">탈퇴하시면 LOG.GG의 모든 데이터가 삭제됩니다.</p>

            <div class="warning-box">
                <h3>유의사항 확인</h3>
                <ul class="warning-list">
                    <li>계정 삭제 시 복구는 불가능합니다.</li>
                    <li>작성하신 게시물 및 댓글은 자동으로 삭제되지 않습니다.</li>
                    <li>탈퇴 후 30일간 동일한 이메일로 재가입이 제한됩니다.</li>
                </ul>
            </div>

            <label class="confirm-area" id="checkLabel">
                <input type="checkbox" id="withdrawCheck">
                안내 사항을 모두 확인하였으며, 이에 동의합니다.
            </label>

            <div class="btn-group">
                <button class="btn btn-cancel" onclick="history.back()">취소</button>
                <button class="btn btn-submit"  id="submitBtn" onclick="location.href='../마이페이지/회원탈퇴2.html'">회원 탈퇴</button>
            </div>
        </div>
    </div>

    <script>
        const checkbox = document.getElementById('withdrawCheck');
        const submitBtn = document.getElementById('submitBtn');

        checkbox.addEventListener('change', function() {
            if (this.checked) {
                submitBtn.classList.add('active');
            } else {
                submitBtn.classList.remove('active');
            }
        });

    
    </script>

</body>
</html>
